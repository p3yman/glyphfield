name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v1.2.3)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    environment: npm
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm
      - name: Use npm with trusted publishing support
        run: npm install --global npm@11.17.0
      - name: Verify tag and package version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ! [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$RELEASE_TAG")"
      - name: Install dependencies
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Run complete verification
        run: npm run verify
      - name: Inspect package dry run
        run: npm pack --dry-run
      - name: Publish with provenance
        run: npm publish --access public --provenance
