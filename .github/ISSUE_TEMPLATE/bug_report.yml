name: Bug report
description: Report a reproducible Glyphfield defect
title: '[Bug]: '
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials or private security details. Use private vulnerability reporting for security issues.
  - type: input
    id: version
    attributes:
      label: Glyphfield version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: React, browser, and operating system
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include props, dimensions, seed, and a repository or sandbox when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
